name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode and SDK info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Pick an iPhone simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; \
            print(next(dev['udid'] for rt,devs in d.items() if 'iOS' in rt \
            for dev in devs if 'iPhone' in dev['name']))")
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          echo "Using simulator: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Build and Test
        run: |
          set -o pipefail
          xcodebuild \
            -project "ToDo Task.xcodeproj" \
            -scheme "ToDo Task" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -configuration Debug \
            clean test | xcbeautify
