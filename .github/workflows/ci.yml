name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode and SDK info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Pick latest iOS + newest iPhone simulator
        run: |
          set -e
          xcrun simctl list devices available -j > /tmp/devices.json
          SELECTION=$(python3 - <<'PYEOF'
          import json, re
          with open("/tmp/devices.json") as f:
              data = json.load(f)["devices"]
          ios = sorted(
              [(rt, devs) for rt, devs in data.items() if "iOS" in rt and devs],
              key=lambda kv: [int(n) for n in re.findall(r"\d+", kv[0])],
              reverse=True,
          )
          if not ios:
              raise SystemExit("No iOS runtimes available on this runner")
          latest_rt, devs = ios[0]
          def rank(name):
              m = re.search(r"iPhone\s+(\d+)", name)
              num = int(m.group(1)) if m else 0
              return (num, "Pro Max" in name, "Pro" in name, "Plus" in name)
          iphones = [d for d in devs if "iPhone" in d["name"]]
          if not iphones:
              raise SystemExit(f"No iPhone simulators in {latest_rt}")
          best = max(iphones, key=lambda d: rank(d["name"]))
          print(best["udid"] + "|" + best["name"] + "|" + latest_rt)
          PYEOF
          )
          UDID="${SELECTION%%|*}"
          REST="${SELECTION#*|}"
          NAME="${REST%%|*}"
          RUNTIME="${REST#*|}"
          echo "DEVICE_ID=$UDID" >> $GITHUB_ENV
          echo "Selected: $NAME on $RUNTIME ($UDID)"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Build and Test
        run: |
          set -o pipefail
          xcodebuild \
            -project "ToDo Task.xcodeproj" \
            -scheme "ToDo Task" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -configuration Debug \
            clean test | xcbeautify
